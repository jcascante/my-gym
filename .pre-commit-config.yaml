repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-json
      - id: check-merge-conflict

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3.13
        files: ^backend/

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        files: ^backend/
        args: [--fix]

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: mypy backend/app/ --strict
        language: python
        types: [python]
        files: ^backend/app/.*\.py$
        pass_filenames: false
        additional_dependencies: ['mypy==1.14.1', 'types-python-jose==3.5.0.20260408', 'types-passlib==1.7.7.20250516', 'types-pyjwt==1.7.1', 'types-pyyaml==6.0.12.20260518', 'fastapi>=0.115.2', 'pydantic>=2.10.4', 'pydantic-settings>=2.4.0', 'sqlalchemy>=2.0.37', 'python-jose[cryptography]>=3.3.0', 'pyjwt>=2.10.1', 'pyyaml>=6.0.2']

      - id: eslint
        name: eslint
        entry: bash -c 'cd frontend && npm run lint'
        language: system
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: false

      - id: prettier
        name: prettier
        entry: frontend/node_modules/.bin/prettier --write
        language: system
        files: ^frontend/src/.*\.(ts|tsx)$
