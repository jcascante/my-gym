name: Seed Database

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Seed database
        run: |
          NETWORK_CONFIG=$(aws ecs describe-services \
            --cluster ${{ vars.ECS_CLUSTER_NAME }} \
            --services ${{ vars.ECS_SERVICE_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --query 'services[0].networkConfiguration.awsvpcConfiguration' --output json)

          TASK_DEF=$(aws ecs describe-services \
            --cluster ${{ vars.ECS_CLUSTER_NAME }} \
            --services ${{ vars.ECS_SERVICE_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --query 'services[0].taskDefinition' --output text)

          # Exercises are seeded before program templates since templates reference
          # exercise movement patterns.
          SEED_CMD='uv run python -m app.db.seed.seed_exercises && uv run python -m app.db.seed.seed_program_templates'

          TASK_ARN=$(aws ecs run-task \
            --cluster ${{ vars.ECS_CLUSTER_NAME }} \
            --task-definition "$TASK_DEF" \
            --launch-type FARGATE \
            --network-configuration "{\"awsvpcConfiguration\": $NETWORK_CONFIG}" \
            --overrides "{\"containerOverrides\":[{\"name\":\"backend\",\"command\":[\"sh\",\"-c\",\"$SEED_CMD\"]}]}" \
            --region ${{ env.AWS_REGION }} \
            --query 'tasks[0].taskArn' --output text)

          aws ecs wait tasks-stopped \
            --cluster ${{ vars.ECS_CLUSTER_NAME }} \
            --tasks "$TASK_ARN" \
            --region ${{ env.AWS_REGION }}

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster ${{ vars.ECS_CLUSTER_NAME }} \
            --tasks "$TASK_ARN" \
            --region ${{ env.AWS_REGION }} \
            --query 'tasks[0].containers[0].exitCode' --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "Seed task failed with exit code $EXIT_CODE"
            exit 1
          fi
