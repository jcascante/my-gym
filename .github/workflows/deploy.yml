name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t $ECR_REGISTRY/gym-app-backend:$IMAGE_TAG backend/
          docker tag $ECR_REGISTRY/gym-app-backend:$IMAGE_TAG $ECR_REGISTRY/gym-app-backend:latest
          docker push $ECR_REGISTRY/gym-app-backend:$IMAGE_TAG
          docker push $ECR_REGISTRY/gym-app-backend:latest

      - name: Run database migrations
        run: |
          NETWORK_CONFIG=$(aws ecs describe-services \
            --cluster ${{ vars.ECS_CLUSTER_NAME }} \
            --services ${{ vars.ECS_SERVICE_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --query 'services[0].networkConfiguration.awsvpcConfiguration' --output json)

          TASK_DEF=$(aws ecs describe-services \
            --cluster ${{ vars.ECS_CLUSTER_NAME }} \
            --services ${{ vars.ECS_SERVICE_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --query 'services[0].taskDefinition' --output text)

          TASK_ARN=$(aws ecs run-task \
            --cluster ${{ vars.ECS_CLUSTER_NAME }} \
            --task-definition "$TASK_DEF" \
            --launch-type FARGATE \
            --network-configuration "{\"awsvpcConfiguration\": $NETWORK_CONFIG}" \
            --overrides '{"containerOverrides":[{"name":"backend","command":["uv","run","alembic","upgrade","head"]}]}' \
            --region ${{ env.AWS_REGION }} \
            --query 'tasks[0].taskArn' --output text)

          aws ecs wait tasks-stopped \
            --cluster ${{ vars.ECS_CLUSTER_NAME }} \
            --tasks "$TASK_ARN" \
            --region ${{ env.AWS_REGION }}

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster ${{ vars.ECS_CLUSTER_NAME }} \
            --tasks "$TASK_ARN" \
            --region ${{ env.AWS_REGION }} \
            --query 'tasks[0].containers[0].exitCode' --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration task failed with exit code $EXIT_CODE"
            exit 1
          fi

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster ${{ vars.ECS_CLUSTER_NAME }} \
            --service ${{ vars.ECS_SERVICE_NAME }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        env:
          VITE_API_URL: https://api.costabirra.com
        run: npm run build
        working-directory: frontend

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync dist/ s3://${{ vars.FRONTEND_BUCKET }} --delete --region ${{ env.AWS_REGION }}
        working-directory: frontend

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths '/*'

  # Terraform deployments are managed locally via `terraform apply`
  # Infrastructure changes are infrequent and require manual review for safety.
  # To deploy infrastructure changes:
  #   1. Update Terraform files in terraform/ or terraform/bootstrap/
  #   2. Run `terraform plan` locally to review changes
  #   3. Run `terraform apply` manually after approval
  #
  # This ensures infrastructure changes are deliberate and fully reviewed
  # before touching shared production resources.
